<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>CEK REKENING MP1</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0c10;
      --surface: #141720;
      --surface2: #1c2030;
      --border: #252a3a;
      --accent: #00ff88;
      --text: #e8ecf4;
      --muted: #6b7592;
      --mono: 'DM Mono', monospace;
      --sans: 'Sora', sans-serif;
    }
    [data-theme="light"] {
      --bg: #f8f9fc;
      --surface: #ffffff;
      --surface2: #f1f3f8;
      --border: #d1d5e0;
      --accent: #00cc77;
      --text: #1a1f2e;
      --muted: #64748b;
    }

    body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; padding: 1rem; position: relative; overflow-x: hidden; }

    /* MATRIX RAIN */
    #matrix-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.75; }

    .wrapper { width: 100%; max-width: 420px; margin: 0 auto; z-index: 2; position: relative; }
    .header { text-align: center; margin-bottom: 1.5rem; position: relative; }

    .theme-toggle {
      position: absolute; top: 8px; right: 8px;
      background: none; border: none; font-size: 1.6rem; cursor: pointer;
      padding: 8px; border-radius: 50%; width: 48px; height: 48px;
    }

    /* RUNNING LOGOS */
    .running-logos {
      margin: 20px 0 25px 0;
      overflow: hidden;
      white-space: nowrap;
      position: relative;
    }
    .running-logos::before, .running-logos::after {
      content: ''; position: absolute; top: 0; bottom: 0; width: 40px; z-index: 2; pointer-events: none;
    }
    .running-logos::before { left: 0; background: linear-gradient(to right, var(--bg), transparent); }
    .running-logos::after { right: 0; background: linear-gradient(to left, var(--bg), transparent); }

    .logos-container {
      display: inline-flex;
      animation: marquee 28s linear infinite;
    }
    .logos-container img {
      height: 42px;
      margin: 0 18px;
      filter: brightness(1.1) drop-shadow(0 0 8px #00ff88);
      opacity: 0.9;
    }
    @keyframes marquee {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    .badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(0,255,136,0.15); border: 1px solid rgba(0,255,136,0.6); border-radius: 9999px; padding: 4px 16px; font-size: 0.75rem; font-weight: 700; color: var(--accent); animation: badgeFlicker 2s infinite alternate; }
    @keyframes badgeFlicker { 0% { text-shadow: 0 0 8px var(--accent); } 100% { text-shadow: 0 0 20px var(--accent), 0 0 30px var(--accent); } }

    .header h1 { font-size: 1.85rem; font-weight: 700; line-height: 1.15; letter-spacing: -0.03em; animation: titleNeon 3s ease-in-out infinite alternate; }
    @keyframes titleNeon { 0% { text-shadow: 0 0 10px var(--accent); } 100% { text-shadow: 0 0 30px var(--accent), 0 0 50px var(--accent); } }

    .tabs { display: grid; grid-template-columns: 1fr 1fr; background: var(--surface2); border-radius: 14px; padding: 5px; border: 1px solid var(--border); margin-bottom: 1.6rem; }
    .tab-btn { padding: 14px 16px; border: none; background: transparent; color: var(--muted); font-weight: 600; font-size: 0.95rem; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.25s; }
    .tab-btn.active { background: var(--accent); color: #000; box-shadow: 0 0 25px var(--accent); animation: tabPulse 2s ease-in-out infinite alternate; }
    @keyframes tabPulse { 0% { box-shadow: 0 0 15px var(--accent); } 100% { box-shadow: 0 0 35px var(--accent), 0 0 50px var(--accent); } }

    .panel { display: none; }
    .panel.active { display: block; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 1.8rem; }
    .field { margin-bottom: 1.4rem; }
    label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--muted); margin-bottom: 0.5rem; }
    select, input { 
      width: 100%; background: var(--surface2); border: 1px solid var(--border); 
      border-radius: 12px; padding: 14px 16px; color: var(--text); 
      font-family: var(--mono); font-size: 1rem; outline: none; 
    }

    .btn {
      width: 100%; padding: 15px; background: var(--accent); color: #000;
      border: none; border-radius: 12px; font-weight: 600; font-size: 1rem;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      cursor: pointer; box-shadow: 0 0 20px var(--accent); transition: all 0.3s;
    }
    .btn:hover { box-shadow: 0 0 40px var(--accent), 0 0 60px var(--accent); transform: scale(1.03); }

    .spinner { width: 26px; height: 26px; border: 4px solid rgba(0,255,136,0.25); border-top-color: #00ff88; border-radius: 50%; animation: spin 0.9s linear infinite, neonLoadingPulse 1.4s ease-in-out infinite alternate; box-shadow: 0 0 20px #00ff88, 0 0 35px #00ff88, 0 0 50px #00ff88; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes neonLoadingPulse { 0% { box-shadow: 0 0 15px #00ff88, 0 0 25px #00ff88; } 100% { box-shadow: 0 0 35px #00ff88, 0 0 55px #00ff88, 0 0 70px #00ff88; } }

    .result { margin-top: 1.5rem; border-radius: 16px; display: none; }
    .result.show { display: block; animation: resultGlow 2s ease-in-out infinite alternate; }
    .result.success { background: rgba(0,255,136,0.12); border: 1px solid rgba(0,255,136,0.6); }
    .result-header { padding: 14px 18px; font-weight: 700; font-size: 0.85rem; border-radius: 16px 16px 0 0; text-shadow: 0 0 12px var(--accent); }
    .result.success .result-header { background: rgba(0,255,136,0.25); color: #000; }
    .result-body { padding: 1.4rem 1.6rem; }
    .result-name { font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; color: var(--accent); text-shadow: 0 0 15px var(--accent); }
    .copy-btn { margin-top: 12px; width: 100%; padding: 13px; background: #111; color: #fff; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; }
    .footer-note { text-align: center; margin-top: 2rem; font-size: 0.78rem; color: var(--muted); }
  </style>
</head>
<body>
  <canvas id="matrix-canvas"></canvas>

  <div class="wrapper">
    <div class="header">
      <button onclick="toggleTheme()" class="theme-toggle" id="theme-toggle">🌙</button>

      <div class="badge">● SECURITY VERIFIED ●</div>
      <h1>Cek <span>Rekening</span> &amp;<br/>E-Wallet</h1>
      <p>Pastikan isi dengan benar yaa</p>

      <!-- RUNNING LOGOS -->
      <div class="running-logos">
        <div class="logos-container" id="logos-container"></div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('bank')">🏦 Bank</button>
      <button class="tab-btn" onclick="switchTab('ewallet')">📱 E-Wallet</button>
    </div>

    <!-- BANK PANEL -->
    <div class="panel active" id="panel-bank">
      <div class="card">
        <div class="field"><label>Pilih Bank</label>
          <select id="bank-select"><option value="">-- Pilih Bank --</option>
            <option value="bank_bca">BCA</option><option value="bank_bni">BNI</option><option value="bank_bri">BRI</option>
            <option value="bank_mandiri">MANDIRI</option><option value="bank_bsm">BSI</option><option value="bank_permata">PERMATA</option>
            <option value="bank_cimb">CIMB</option><option value="bank_btn">BTN</option><option value="bank_danamon">DANAMON</option>
            <option value="bank_artos">JAGO</option><option value="bank_kesejahteraan_ekonomi">SEABANK</option>
            <option value="bank_royal">BLU</option><option value="bank_tabungan_pensiunan_nasional">JENIUS</option>
            <option value="bank_mega">MEGA</option><option value="bank_bii">MAYBANK</option>
            <option value="bank_panin">PANIN</option><option value="bank_sinarmas">SINARMAS</option>
          </select>
        </div>
        <div class="field"><label>Nomor Rekening</label>
          <input type="text" id="bank-number" placeholder="Contoh: 12345678" inputmode="numeric" oninput="this.value = this.value.replace(/[^0-9]/g, '')" />
        </div>
        <button class="btn" id="btn-bank" onclick="checkBank()">
          🔍 <span id="btn-bank-text">Cek Rekening</span>
        </button>
      </div>
      <div class="result" id="result-bank"></div>
    </div>

    <!-- E-WALLET PANEL -->
    <div class="panel" id="panel-ewallet">
      <div class="card">
        <div class="field"><label>Pilih E-Wallet</label>
          <select id="ew-select"><option value="">-- Pilih E-Wallet --</option>
            <option value="wallet_dana">DANA</option><option value="wallet_ovo">OVO</option><option value="gopay_user">GOPAY</option>
            <option value="wallet_shopeepay">SHOPEEPAY</option><option value="wallet_linkaja">LINK AJA</option>
            <option value="wallet_isaku">I.SAKU</option><option value="wallet_astrapay">AstraPay</option><option value="qris">QRIS</option>
          </select>
        </div>
        <div class="field"><label>Nomor HP</label>
          <input type="text" id="ew-number" placeholder="Contoh: 0812345678" inputmode="numeric" oninput="this.value = this.value.replace(/[^0-9]/g, '')" />
        </div>
        <button class="btn" id="btn-ew" onclick="checkEwallet()">
          🔍 <span id="btn-ew-text">Cek E-Wallet</span>
        </button>
      </div>
      <div class="result" id="result-ew"></div>
    </div>

    <p class="footer-note">Data real-time dari sistem perbankan Indonesia</p>
    <p class="footer-note">By @PelerMonyetProject</p>
  </div>

  <script>
    const API_KEY = "503c53df-222b-41f5-abb0-70563a22828a";

    // ==================== MATRIX RAIN ====================
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    let fontSize = 13;
    let columns;
    let drops = [];

    function resizeCanvas() {
      canvas.height = window.innerHeight;
      canvas.width = window.innerWidth;
      columns = Math.floor(canvas.width / fontSize);
      drops = Array(columns).fill(1);
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    const chars = "01アイウエオ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ@#$%^&*";
    function drawMatrix() {
      ctx.fillStyle = 'rgba(10, 12, 16, 0.12)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#00ff88';
      ctx.font = `${fontSize}px monospace`;
      for (let i = 0; i < drops.length; i++) {
        const text = chars[Math.floor(Math.random() * chars.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      }
    }
    function animate() {
      drawMatrix();
      requestAnimationFrame(animate);
    }
    animate();

    // ==================== RUNNING LOGOS ====================
const logos = [
  "https://feedbet-image.idnsp.net/uploads/paymentMethod/202512011803369798.png?v=1776425094036z435c7",
  "https://feedbet-image.idnsp.net/uploads/paymentMethod/202412252038463027.png?v=1776425094036z435c7",
  "https://feedbet-image.idnsp.net/uploads/paymentMethod/202512011741078394.png?v=1776425094036z435c7",
  "https://feedbet-image.idnsp.net/uploads/paymentMethod/202512011804167182.webp?v=1776425094036z435c7",
  "https://feedbet-image.idnsp.net/uploads/paymentMethod/202408301641353801.webp?v=1776425094036z435c7",
  "https://feedbet-image.idnsp.net/uploads/paymentMethod/20250430230542817.png?v=1776425094036z435c7",
  "https://feedbet-image.idnsp.net/uploads/paymentMethod/20250205183129232.png?v=1776425094036z435c7",
  "https://feedbet-image.idnsp.net/uploads/paymentMethod/202408271349366610.webp?v=1776425094036z435c7",
  "https://feedbet-image.idnsp.net/uploads/paymentMethod/202408271349367879.webp?v=1776425094036z435c7",
  "https://feedbet-image.idnsp.net/uploads/paymentMethod/202408271349365131.webp?v=1776425094036z435c7",
  "https://feedbet-image.idnsp.net/uploads/paymentMethod/202408271349366783.webp?v=1776425094036z435c7",
  "https://feedbet-image.idnsp.net/uploads/paymentMethod/202408271349365076.webp?v=1776425094036z435c7",
  "https://feedbet-image.idnsp.net/uploads/paymentMethod/202408271349365471.webp?v=1776425094036z435c7",
  "https://feedbet-image.idnsp.net/uploads/paymentMethod/202408280908305599.webp?v=1776425094036z435c7",
  "https://feedbet-image.idnsp.net/uploads/paymentMethod/202408271349367518.webp?v=1776425094036z435c7",
  "https://feedbet-image.idnsp.net/uploads/paymentMethod/20240827134936414.webp?v=1776425094036z435c7",
  "https://feedbet-image.idnsp.net/uploads/paymentMethod/202408271349362828.webp?v=1776425094036z435c7",
  "https://feedbet-image.idnsp.net/uploads/paymentMethod/202408271349368751.webp?v=1776425094036z435c7",
  "https://feedbet-image.idnsp.net/uploads/paymentMethod/202408271353003701.webp?v=1776425094036z435c7",
  "https://feedbet-image.idnsp.net/uploads/paymentMethod/202408271353002618.webp?v=1776425094036z435c7"
];

    function createRunningLogos() {
      const container = document.getElementById('logos-container');
      const allLogos = [...logos, ...logos];
      allLogos.forEach(src => {
        const img = document.createElement('img');
        img.src = src;
        img.alt = "bank logo";
        container.appendChild(img);
      });
    }

    // ==================== THEME TOGGLE ====================
    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme') || 'dark';
      const newTheme = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      document.getElementById('theme-toggle').textContent = newTheme === 'light' ? '☀️' : '🌙';
    }

    function loadTheme() {
      const saved = localStorage.getItem('theme');
      if (saved) {
        document.documentElement.setAttribute('data-theme', saved);
        document.getElementById('theme-toggle').textContent = saved === 'light' ? '☀️' : '🌙';
      }
    }

    // ==================== SCRIPT ASLI KAMU (TIDAK DIUBAH) ====================
    function initTelegram() {
      Telegram.WebApp.ready();
      Telegram.WebApp.expand();
      Telegram.WebApp.setHeaderColor("#0d0f14");
      Telegram.WebApp.setBackgroundColor("#0d0f14");
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      if (tab === 'bank') document.querySelector('.tab-btn:first-child').classList.add('active');
      else document.querySelector('.tab-btn:last-child').classList.add('active');
      document.getElementById('panel-bank').classList.toggle('active', tab === 'bank');
      document.getElementById('panel-ewallet').classList.toggle('active', tab === 'ewallet');
    }

    function setLoading(btnId, loading, type = '') {
      const btn = document.getElementById(btnId);
      const text = document.getElementById(btnId + '-text');
      btn.disabled = loading;
      btn.classList.toggle('loading', loading);
      if (loading) {
        text.innerHTML = `<span class="spinner"></span> Sedang mengecek ${type}...`;
      } else {
        text.innerHTML = type === 'bank' ? 'Cek Rekening' : 'Cek E-Wallet';
      }
    }

async function checkBank() {
  const bankSelect = document.getElementById('bank-select');
  const bankCode = bankSelect.value;
  const bankName = bankSelect.options[bankSelect.selectedIndex].textContent;   // ← ini yang baru
  const number = document.getElementById('bank-number').value.trim();
  
  if (!bankCode || !number) return alert('Pilih bank dan masukkan nomor rekening!');
  
  setLoading('btn-bank', true, 'rekening');
  const resultEl = document.getElementById('result-bank');
  
  try {
    const res = await fetch('https://rfpdev.xyz/api/check-rekening', {
      method: 'POST',
      headers: {'Content-Type': 'application/x-www-form-urlencoded'},
      body: new URLSearchParams({ api_key: API_KEY, bank_code: bankCode, account_number: number })
    });
    const json = await res.json();
    
    if (json.status === 'success') {
      const nama = json.data?.customer_name || 'Tidak terdeteksi';
      resultEl.className = 'result show success';
      resultEl.innerHTML = `
        <div class="result-header">✅ VERIFIKASI BERHASIL</div>
        <div class="result-body">
          <div><strong>Jenis Akun</strong><br><span style="color:#00ff88">${bankName}</span></div>
          <div style="margin:12px 0"><strong>Nomor Rekening</strong><br><span style="font-family:monospace">${number}</span></div>
          <div><strong>Nama Pemilik</strong><br><span class="result-name">${nama}</span></div>
          <button onclick="navigator.clipboard.writeText('${nama}').then(()=>this.innerHTML='✅ Berhasil disalin!')" class="copy-btn">📋 Salin Nama Pemilik</button>
        </div>`;
    } else {
      resultEl.className = 'result show error';
      resultEl.innerHTML = `<div class="result-header">❌ GAGAL</div><div class="result-body">${json.message || 'Data tidak ditemukan'}</div>`;
    }
  } catch (e) {
    resultEl.className = 'result show error';
    resultEl.innerHTML = `<div class="result-header">❌ ERROR</div><div class="result-body">Koneksi bermasalah</div>`;
  } finally {
    setLoading('btn-bank', false);
  }
}

async function checkEwallet() {
  const ewSelect = document.getElementById('ew-select');
  const walletCode = ewSelect.value;
  const ewName = ewSelect.options[ewSelect.selectedIndex].textContent;   // ← ini yang baru
  const number = document.getElementById('ew-number').value.trim();
  
  if (!walletCode || !number) return alert('Pilih e-wallet dan masukkan nomor HP!');
  
  setLoading('btn-ew', true, 'e-wallet');
  const resultEl = document.getElementById('result-ew');
  
  try {
    const res = await fetch('https://rfpdev.xyz/api/check-ewallet', {
      method: 'POST',
      headers: {'Content-Type': 'application/x-www-form-urlencoded'},
      body: new URLSearchParams({ api_key: API_KEY, ewallet_code: walletCode, phone_number: number })
    });
    const json = await res.json();
    
    if (json.status === 'success') {
      const nama = json.data?.customer_name || 'Tidak terdeteksi';
      resultEl.className = 'result show success';
      resultEl.innerHTML = `
        <div class="result-header">✅ VERIFIKASI BERHASIL</div>
        <div class="result-body">
          <div><strong>Jenis Akun</strong><br><span style="color:#00ff88">${ewName}</span></div>
          <div style="margin:12px 0"><strong>Nomor HP</strong><br><span style="font-family:monospace">${number}</span></div>
          <div><strong>Nama Pemilik</strong><br><span class="result-name">${nama}</span></div>
          <button onclick="navigator.clipboard.writeText('${nama}').then(()=>this.innerHTML='✅ Berhasil disalin!')" class="copy-btn">📋 Salin Nama Pemilik</button>
        </div>`;
    } else {
      resultEl.className = 'result show error';
      resultEl.innerHTML = `<div class="result-header">❌ GAGAL</div><div class="result-body">${json.message || 'Data tidak ditemukan'}</div>`;
    }
  } catch (e) {
    resultEl.className = 'result show error';
    resultEl.innerHTML = `<div class="result-header">❌ ERROR</div><div class="result-body">Koneksi bermasalah</div>`;
  } finally {
    setLoading('btn-ew', false);
  }
}

    // INIT
    initTelegram();
    createRunningLogos();
    loadTheme();
  </script>
</body>
</html>
