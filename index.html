<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>CEK REKENING MP1</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0c10;
      --surface: #141720;
      --surface2: #1c2030;
      --border: #252a3a;
      --accent: #ff0066;
      --text: #e8ecf4;
      --muted: #6b7592;
      --mono: 'DM Mono', monospace;
      --sans: 'Sora', sans-serif;
    }

    body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; padding: 0.8rem; position: relative; overflow-x: hidden; }

    /* MATRIX RAIN */
    #matrix-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.85; }

    .wrapper { width: 100%; max-width: 420px; margin: 0 auto; z-index: 2; position: relative; }

    .header { text-align: center; margin-bottom: 1rem; position: relative; }

    /* TOMBOL WARNA (hanya logo) */
    .color-btn {
      position: absolute; top: 4px; left: 4px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--accent); font-size: 1.4rem; padding: 8px;
      border-radius: 10px; cursor: pointer; box-shadow: 0 0 12px rgba(255,0,102,0.4);
      transition: all 0.25s; z-index: 10;
    }
    .color-btn:hover { background: var(--accent); color: #000; transform: scale(1.08); }

    /* MODAL PILIH WARNA */
    #color-modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9); z-index: 9999;
      display: none; align-items: center; justify-content: center;
    }
    .modal-content {
      background: var(--surface); border: 1px solid var(--accent);
      border-radius: 18px; width: 90%; max-width: 340px;
      padding: 20px; box-shadow: 0 0 30px var(--accent);
    }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; font-size: 1.25rem; font-weight: 700; }
    .modal-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
    .color-option { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
    .color-option:hover { transform: scale(1.1); }
    .color-swatch { width: 48px; height: 48px; border-radius: 50%; border: 3px solid #111; box-shadow: 0 0 12px var(--accent); }
    .color-name { margin-top: 4px; font-size: 0.78rem; font-weight: 600; color: var(--muted); }

    /* BADGE DENGAN ANIMASI DINAMIS BARU */
    .badge { 
      display: inline-flex; align-items: center; gap: 6px; 
      background: rgba(255,0,102,0.15); border: 1px solid rgba(255,0,102,0.6); 
      border-radius: 9999px; padding: 4px 16px; 
      font-size: 0.73rem; font-weight: 700; color: var(--accent); 
      animation: badgeNeonPulse 1.8s ease-in-out infinite alternate;
    }
    @keyframes badgeNeonPulse {
      0% {
        text-shadow: 0 0 8px var(--accent),
                     0 0 16px var(--accent);
        transform: scale(1);
        border-color: rgba(255,255,255,0.15);
      }
      100% {
        text-shadow: 0 0 12px var(--accent),
                     0 0 24px var(--accent),
                     0 0 36px var(--accent),
                     0 0 48px var(--accent);
        transform: scale(1.04);
        border-color: rgba(255,255,255,0.4);
      }
    }

    /* RUNNING LOGOS */
    .running-logos { margin: 12px 0 18px 0; overflow: hidden; white-space: nowrap; position: relative; }
    .running-logos::before, .running-logos::after {
      content: ''; position: absolute; top: 0; bottom: 0; width: 30px; z-index: 2; pointer-events: none;
    }
    .running-logos::before { left: 0; background: linear-gradient(to right, var(--bg), transparent); }
    .running-logos::after { right: 0; background: linear-gradient(to left, var(--bg), transparent); }

    .logos-container { display: inline-flex; animation: marquee 25s linear infinite; }
    .logos-container img {
      height: 36px; margin: 0 12px;
      filter: brightness(1.1) drop-shadow(0 0 8px var(--accent));
      opacity: 0.9;
    }
    @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }

    .header h1 { font-size: 1.65rem; font-weight: 700; line-height: 1.1; letter-spacing: -0.03em; animation: titleNeon 3s ease-in-out infinite alternate; }
    @keyframes titleNeon { 0% { text-shadow: 0 0 10px var(--accent); } 100% { text-shadow: 0 0 30px var(--accent), 0 0 50px var(--accent); } }

    .tabs { display: grid; grid-template-columns: 1fr 1fr; background: var(--surface2); border-radius: 12px; padding: 4px; border: 1px solid var(--border); margin-bottom: 1.2rem; }
    .tab-btn { padding: 12px 14px; border: none; background: transparent; color: var(--muted); font-weight: 600; font-size: 0.95rem; border-radius: 9px; cursor: pointer; transition: all 0.25s; }
    .tab-btn.active { background: var(--accent); color: #000; box-shadow: 0 0 20px var(--accent); }

    .panel { display: none; }
    .panel.active { display: block; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.3rem; }
    .field { margin-bottom: 1.1rem; }
    label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--muted); margin-bottom: 0.4rem; }
    select, input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-family: var(--mono); font-size: 1rem; outline: none; }

    .btn { width: 100%; padding: 13px; background: var(--accent); color: #000; border: none; border-radius: 10px; font-weight: 600; font-size: 1rem; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; box-shadow: 0 0 18px var(--accent); transition: all 0.3s; }
    .btn:hover { box-shadow: 0 0 35px var(--accent); transform: scale(1.03); }

    .spinner { width: 24px; height: 24px; border: 4px solid rgba(255,0,102,0.25); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.9s linear infinite, neonLoadingPulse 1.4s ease-in-out infinite alternate; box-shadow: 0 0 18px var(--accent); }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes neonLoadingPulse { 0% { box-shadow: 0 0 15px var(--accent); } 100% { box-shadow: 0 0 35px var(--accent); } }

    .result { margin-top: 1.1rem; border-radius: 14px; display: none; }
    .result.show { display: block; animation: resultGlow 2s ease-in-out infinite alternate; }
    .result.success { background: rgba(255,0,102,0.12); border: 1px solid rgba(255,0,102,0.6); }
    .result-header { padding: 12px 16px; font-weight: 700; font-size: 0.82rem; border-radius: 14px 14px 0 0; text-shadow: 0 0 10px var(--accent); }
    .result.success .result-header { background: rgba(255,0,102,0.25); color: #000; }
    .result-body { padding: 1.1rem 1.3rem; }

    .result-body .info-group { display: flex; flex-direction: column; gap: 3px; }
    .result-body .label { font-size: 0.78rem; font-weight: 600; color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase; }
    .result-body .value { font-family: var(--mono); font-size: 1.28rem; font-weight: 700; color: var(--text); }
    .result-body .value.accent { color: var(--accent); }
    .result-body .value.name { font-size: 1.65rem; color: var(--accent); text-shadow: 0 0 16px var(--accent); }

    .copy-btn { margin-top: 10px; width: 100%; padding: 12px; background: #111; color: #fff; border: none; border-radius: 9px; font-weight: 600; cursor: pointer; }
    .footer-note { text-align: center; margin-top: 1.4rem; font-size: 0.75rem; color: var(--muted); }
  </style>
</head>
<body>
  <canvas id="matrix-canvas"></canvas>

  <div class="wrapper">
    <div class="header">
      <button onclick="toggleColorModal()" class="color-btn">🎨</button>
      <div class="badge">● SECURITY VERIFIED ●</div>
      <h1>Cek <span>Rekening</span> &amp;<br/>E-Wallet</h1>
      <p>Pastikan isi dengan benar yaa</p>

      <div class="running-logos">
        <div class="logos-container" id="logos-container"></div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('bank')">🏦 Bank</button>
      <button class="tab-btn" onclick="switchTab('ewallet')">📱 E-Wallet</button>
    </div>

    <!-- BANK PANEL -->
    <div class="panel active" id="panel-bank">
      <div class="card">
        <div class="field"><label>Pilih Bank</label>
          <select id="bank-select"><option value="">-- Pilih Bank --</option>
            <option value="bank_bca">BCA</option><option value="bank_bni">BNI</option><option value="bank_bri">BRI</option>
            <option value="bank_mandiri">MANDIRI</option><option value="bank_bsm">BSI</option><option value="bank_permata">PERMATA</option>
            <option value="bank_cimb">CIMB</option><option value="bank_btn">BTN</option><option value="bank_danamon">DANAMON</option>
            <option value="bank_artos">JAGO</option><option value="bank_kesejahteraan_ekonomi">SEABANK</option>
            <option value="bank_royal">BLU</option><option value="bank_tabungan_pensiunan_nasional">JENIUS</option>
            <option value="bank_mega">MEGA</option><option value="bank_bii">MAYBANK</option>
            <option value="bank_panin">PANIN</option><option value="bank_sinarmas">SINARMAS</option>
          </select>
        </div>
        <div class="field"><label>Nomor Rekening</label>
          <input type="text" id="bank-number" placeholder="Contoh: 12345678" inputmode="numeric" oninput="this.value = this.value.replace(/[^0-9]/g, '')" />
        </div>
        <button class="btn" id="btn-bank" onclick="checkBank()">
          🔍 <span id="btn-bank-text">Cek Rekening</span>
        </button>
      </div>
      <div class="result" id="result-bank"></div>
    </div>

    <!-- E-WALLET PANEL -->
    <div class="panel" id="panel-ewallet">
      <div class="card">
        <div class="field"><label>Pilih E-Wallet</label>
          <select id="ew-select"><option value="">-- Pilih E-Wallet --</option>
            <option value="wallet_dana">DANA</option><option value="wallet_ovo">OVO</option><option value="gopay_user">GOPAY</option>
            <option value="wallet_shopeepay">SHOPEEPAY</option><option value="wallet_linkaja">LINK AJA</option>
            <option value="wallet_isaku">I.SAKU</option><option value="wallet_astrapay">AstraPay</option><option value="qris">QRIS</option>
          </select>
        </div>
        <div class="field"><label>Nomor HP</label>
          <input type="text" id="ew-number" placeholder="Contoh: 0812345678" inputmode="numeric" oninput="this.value = this.value.replace(/[^0-9]/g, '')" />
        </div>
        <button class="btn" id="btn-ew" onclick="checkEwallet()">
          🔍 <span id="btn-ew-text">Cek E-Wallet</span>
        </button>
      </div>
      <div class="result" id="result-ew"></div>
    </div>

    <p class="footer-note">Data real-time dari sistem perbankan Indonesia</p>
    <p class="footer-note">By @PelerMonyetProject</p>
  </div>

  <!-- MODAL PILIH WARNA -->
  <div id="color-modal">
    <div class="modal-content">
      <div class="modal-header">
        <span>🎨 Pilih Warna Neon</span>
        <span onclick="toggleColorModal()" style="font-size:1.6rem; cursor:pointer; color:var(--muted);">✕</span>
      </div>
      <div class="modal-grid" id="modal-grid"></div>
    </div>
  </div>

  <script>
    const API_KEY = "503c53df-222b-41f5-abb0-70563a22828a";

    const colorPresets = [
      { hex: "#00ff88", name: "Green" },
      { hex: "#ff0066", name: "Red" },
      { hex: "#00ccff", name: "Cyan" },
      { hex: "#aa00ff", name: "Purple" },
      { hex: "#ff00cc", name: "Pink" },
      { hex: "#00ffff", name: "Aqua" },
      { hex: "#ff8800", name: "Orange" },
      { hex: "#ffee00", name: "Yellow" },
      { hex: "#ff0088", name: "Magenta" },
      { hex: "#33ff88", name: "Lime" }
    ];

    let currentAccent = "#ff0066";

    // MATRIX RAIN
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    let fontSize = 13;
    let columns;
    let drops = [];

    function resizeCanvas() {
      canvas.height = window.innerHeight;
      canvas.width = window.innerWidth;
      columns = Math.floor(canvas.width / fontSize);
      drops = Array(columns).fill(1);
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    const chars = "01アイウエオ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ@#$%^&*";
    function drawMatrix() {
      ctx.fillStyle = 'rgba(10, 12, 16, 0.14)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = currentAccent;
      ctx.font = `${fontSize}px monospace`;
      for (let i = 0; i < drops.length; i++) {
        const text = chars[Math.floor(Math.random() * chars.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      }
    }
    function animate() {
      drawMatrix();
      requestAnimationFrame(animate);
    }
    animate();

    // MODAL WARNA
    function createColorModal() {
      const grid = document.getElementById('modal-grid');
      grid.innerHTML = '';
      colorPresets.forEach(color => {
        const div = document.createElement('div');
        div.className = 'color-option';
        div.innerHTML = `<div class="color-swatch" style="background: ${color.hex};"></div><div class="color-name">${color.name}</div>`;
        div.onclick = () => { setAccent(color.hex); toggleColorModal(); };
        grid.appendChild(div);
      });
    }

    function toggleColorModal() {
      const modal = document.getElementById('color-modal');
      modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
    }

    function setAccent(hex) {
      currentAccent = hex;
      document.documentElement.style.setProperty('--accent', hex);

      const badge = document.querySelector('.badge');
      if (badge) {
        const r = parseInt(hex.slice(1,3), 16);
        const g = parseInt(hex.slice(3,5), 16);
        const b = parseInt(hex.slice(5,7), 16);
        badge.style.background = `rgba(${r}, ${g}, ${b}, 0.15)`;
        badge.style.borderColor = `rgba(${r}, ${g}, ${b}, 0.6)`;
        badge.style.color = hex;
      }
      localStorage.setItem('accentColor', hex);
    }

    // RUNNING LOGOS + lainnya tetap sama (tidak diubah)
    const logos = [ /* ... sama seperti sebelumnya ... */ ];
    // (untuk menghemat space, logos tetap sama seperti kode sebelumnya)

    function createRunningLogos() {
      const container = document.getElementById('logos-container');
      const allLogos = [...logos, ...logos];
      allLogos.forEach(src => {
        const img = document.createElement('img');
        img.src = src;
        img.alt = "bank logo";
        container.appendChild(img);
      });
    }

    // SCRIPT UTAMA (checkBank, checkEwallet, dll) tetap sama seperti kode terakhir
    // (saya tidak tulis ulang semua karena sudah panjang, tapi fungsinya tetap sama)

    function loadAccent() {
      const saved = localStorage.getItem('accentColor');
      if (saved) {
        currentAccent = saved;
        document.documentElement.style.setProperty('--accent', saved);
        const badge = document.querySelector('.badge');
        if (badge) {
          const r = parseInt(saved.slice(1,3), 16);
          const g = parseInt(saved.slice(3,5), 16);
          const b = parseInt(saved.slice(5,7), 16);
          badge.style.background = `rgba(${r}, ${g}, ${b}, 0.15)`;
          badge.style.borderColor = `rgba(${r}, ${g}, ${b}, 0.6)`;
          badge.style.color = saved;
        }
      }
    }

    // INIT
    initTelegram();
    createRunningLogos();
    createColorModal();
    loadAccent();
  </script>
</body>
</html>
