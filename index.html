<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>CEK REKENING MP1</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    .neon { text-shadow: 0 0 25px rgb(0 255 100); }
  </style>
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen">

  <div class="max-w-[380px] mx-auto p-4">

    <!-- HEADER -->
    <div class="flex items-center justify-center gap-3 mt-4 mb-5">
      <span class="text-3xl">⭐</span>
      <h1 class="text-3xl font-bold tracking-[-2px] neon text-center">CEK REKENING MP1</h1>
      <span class="text-3xl">⭐</span>
    </div>
    <p class="text-center text-gray-400 text-sm leading-tight mb-7">
      Cek nama pemilik rekening &amp; e-wallet<br>
      akurat • instan • terpercaya
    </p>

    <!-- MAIN MENU -->
    <div id="mainMenu" class="space-y-3">
      <button onclick="pilihTipe('bank')" class="w-full bg-[#111] hover:bg-[#1a1a1a] active:scale-95 p-4 rounded-3xl flex items-center gap-4 transition-all">
        <div class="w-11 h-11 bg-green-500/10 rounded-2xl flex items-center justify-center text-3xl flex-shrink-0">🏦</div>
        <div><div class="text-lg font-semibold">Cek Bank</div><div class="text-green-400 text-xs">BCA • BRI • Mandiri • dan 15 lainnya</div></div>
      </button>

      <button onclick="pilihTipe('wallet')" class="w-full bg-[#111] hover:bg-[#1a1a1a] active:scale-95 p-4 rounded-3xl flex items-center gap-4 transition-all">
        <div class="w-11 h-11 bg-green-500/10 rounded-2xl flex items-center justify-center text-3xl flex-shrink-0">📱</div>
        <div><div class="text-lg font-semibold">Cek E-Wallet</div><div class="text-green-400 text-xs">DANA • OVO • GoPay • ShopeePay • dll</div></div>
      </button>

      <button onclick="showHistory()" class="w-full bg-[#111] hover:bg-[#1a1a1a] active:scale-95 p-4 rounded-3xl flex items-center gap-4 transition-all">
        <div class="w-11 h-11 bg-blue-500/10 rounded-2xl flex items-center justify-center text-3xl flex-shrink-0">📜</div>
        <div><div class="text-lg font-semibold">Riwayat Cek</div><div class="text-blue-400 text-xs">Lihat semua cek sebelumnya</div></div>
      </button>
    </div>

    <!-- SELECTION SCREEN -->
    <div id="selectionScreen" class="hidden">
      <div class="flex justify-between items-center mb-4">
        <button onclick="backToMain()" class="text-green-400 text-sm">← Kembali</button>
        <h2 id="selectionTitle" class="text-xl font-bold"></h2>
      </div>
      <div id="gridContainer" class="grid gap-3"></div>
    </div>

    <!-- INPUT SCREEN -->
    <div id="inputScreen" class="hidden">
      <div class="flex justify-between mb-4">
        <button onclick="backToSelection()" class="text-green-400 text-sm">← Kembali</button>
        <div id="selectedName" class="font-semibold text-lg"></div>
      </div>
      <input id="nomorInput" type="tel" maxlength="20" class="w-full bg-[#111] rounded-3xl py-5 text-center text-2xl focus:outline-none placeholder-gray-500" placeholder="Masukkan nomor rekening / HP">
      <button onclick="cekRekening()" class="mt-7 w-full bg-green-500 hover:bg-green-400 text-black font-bold py-5 rounded-3xl active:scale-95">✅ CEK SEKARANG</button>
    </div>

    <!-- RESULT SCREEN -->
    <div id="resultScreen" class="hidden">
      <div id="resultCard" class="bg-[#111] rounded-3xl p-6 text-center min-h-[260px]"></div>
      <div class="flex gap-3 mt-6">
        <button onclick="cekLagi()" class="flex-1 bg-[#222] py-4 rounded-3xl text-sm font-medium">🔄 Cek Lagi</button>
        <button onclick="backToMain()" class="flex-1 bg-green-500 text-black py-4 rounded-3xl text-sm font-medium">🏠 Menu Utama</button>
      </div>
    </div>

    <!-- HISTORY SCREEN -->
    <div id="historyScreen" class="hidden">
      <div class="flex justify-between items-center mb-4">
        <button onclick="backToMain()" class="text-green-400 text-sm">← Kembali</button>
        <h2 class="text-xl font-bold">📜 Riwayat Cek</h2>
        <button onclick="clearHistory()" class="text-red-400 text-sm">Hapus Semua</button>
      </div>
      <div id="historyList" class="space-y-3"></div>
    </div>
  </div>

  <script>
    const API_KEY = "503c53df-222b-41f5-abb0-70563a22828a";
    let isBank = true, kodeTerpilih = "", namaTerpilih = "";

    const BANKS = {
      'BCA':'bank_bca','BNI':'bank_bni','BRI':'bank_bri','MANDIRI':'bank_mandiri',
      'BSI':'bank_bsm','PERMATA':'bank_permata','CIMB':'bank_cimb','BTN':'bank_btn',
      'DANAMON':'bank_danamon','JAGO':'bank_artos','SEABANK':'bank_kesejahteraan_ekonomi',
      'BLU':'bank_royal','JENIUS':'bank_tabungan_pensiunan_nasional','MEGA':'bank_mega',
      'MAYBANK':'bank_bii','PANIN':'bank_panin','SINARMAS':'bank_sinarmas'
    };

    const WALLETS = {
      'DANA':'wallet_dana','OVO':'wallet_ovo','GOPAY':'gopay_user',
      'SHOPEEPAY':'wallet_shopeepay','LINK AJA':'wallet_linkaja',
      'I.SAKU':'wallet_isaku','AstraPay':'wallet_astrapay','QRIS':'qris'
    };

    // IKON BANK & E-WALLET YANG LEBIH NYATA (SVG + warna resmi)
    const ICONS = {
      'BCA': `<svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="8" fill="#0066B3"/><text x="24" y="31" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">BCA</text></svg>`,
      'BNI': `<svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="8" fill="#0033A0"/><text x="24" y="31" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">BNI</text></svg>`,
      'BRI': `<svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="8" fill="#ED1C24"/><text x="24" y="31" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">BRI</text></svg>`,
      'MANDIRI': `<svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="8" fill="#00A651"/><text x="24" y="31" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">MANDIRI</text></svg>`,
      'BSI': `<svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="8" fill="#00A651"/><text x="24" y="31" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">BSI</text></svg>`,
      'PERMATA': `<svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="8" fill="#00AEEF"/><text x="24" y="31" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">PERMATA</text></svg>`,
      'CIMB': `<svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="8" fill="#E30613"/><text x="24" y="31" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">CIMB</text></svg>`,
      'BTN': `<svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="8" fill="#003087"/><text x="24" y="31" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">BTN</text></svg>`,
      'DANAMON': `<svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="8" fill="#00AEEF"/><text x="24" y="31" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">DANA</text></svg>`,
      'JAGO': `<svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="8" fill="#00A651"/><text x="24" y="31" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">JAGO</text></svg>`,
      'SEABANK': `<svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="8" fill="#003087"/><text x="24" y="31" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">SEA</text></svg>`,
      'BLU': `<svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="8" fill="#0066B3"/><text x="24" y="31" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">BLU</text></svg>`,
      'JENIUS': `<svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="8" fill="#00A651"/><text x="24" y="31" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">JENIUS</text></svg>`,
      'MEGA': `<svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="8" fill="#E30613"/><text x="24" y="31" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">MEGA</text></svg>`,
      'MAYBANK': `<svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="8" fill="#003087"/><text x="24" y="31" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">MAY</text></svg>`,
      'PANIN': `<svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="8" fill="#00AEEF"/><text x="24" y="31" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">PANIN</text></svg>`,
      'SINARMAS': `<svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="8" fill="#E30613"/><text x="24" y="31" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">SINA</text></svg>`,

      'DANA': `<svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="8" fill="#FFCC00"/><text x="24" y="31" font-size="18" font-weight="700" fill="#000" text-anchor="middle">DANA</text></svg>`,
      'OVO': `<svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="8" fill="#4C2C8F"/><text x="24" y="31" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">OVO</text></svg>`,
      'GOPAY': `<svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="8" fill="#00A651"/><text x="24" y="31" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">GOPAY</text></svg>`,
      'SHOPEEPAY': `<svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="8" fill="#FF6600"/><text x="24" y="31" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">SHOPEE</text></svg>`,
      'LINK AJA': `<svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="8" fill="#00AEEF"/><text x="24" y="31" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">LINK</text></svg>`,
      'I.SAKU': `<svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="8" fill="#FF6600"/><text x="24" y="31" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">I.SAKU</text></svg>`,
      'AstraPay': `<svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="8" fill="#003087"/><text x="24" y="31" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">ASTRA</text></svg>`,
      'QRIS': `<svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="8" fill="#000"/><text x="24" y="31" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">QRIS</text></svg>`
    };

    function initTelegram() {
      Telegram.WebApp.ready();
      Telegram.WebApp.expand();
      Telegram.WebApp.setHeaderColor("#0a0a0a");
      Telegram.WebApp.setBackgroundColor("#0a0a0a");
    }

    // === RIWAYAT (sama seperti sebelumnya) ===
    function saveToHistory(isBank, namaTerpilih, nomor, namaPemilik) {
      let history = JSON.parse(localStorage.getItem('cekHistory') || '[]');
      history.unshift({ type: isBank ? 'BANK' : 'WALLET', nama: namaTerpilih, nomor, pemilik: namaPemilik, time: new Date().toLocaleString('id-ID', {dateStyle:'short', timeStyle:'short'}) });
      if (history.length > 20) history.pop();
      localStorage.setItem('cekHistory', JSON.stringify(history));
    }

    function showHistory() {
      document.getElementById('mainMenu').classList.add('hidden');
      document.getElementById('historyScreen').classList.remove('hidden');
      renderHistory();
    }

    function renderHistory() {
      const list = document.getElementById('historyList');
      const history = JSON.parse(localStorage.getItem('cekHistory') || '[]');
      list.innerHTML = history.length === 0 
        ? `<div class="text-center py-10 text-gray-400">Belum ada riwayat cek</div>` 
        : history.map(item => `
          <div class="bg-[#111] rounded-3xl p-4 cursor-pointer hover:bg-[#1a1a1a]" onclick="loadFromHistory('${item.type}','${item.nama}','${item.nomor}')">
            <div class="flex justify-between text-xs text-gray-400 mb-1"><span>${item.type} • ${item.nama}</span><span>${item.time}</span></div>
            <div class="font-medium">${item.nomor}</div>
            <div class="text-green-300">${item.pemilik}</div>
          </div>`).join('');
    }

    function loadFromHistory(type, nama, nomor) {
      isBank = type === 'BANK';
      kodeTerpilih = isBank ? BANKS[nama] || '' : WALLETS[nama] || '';
      namaTerpilih = nama;
      document.getElementById('historyScreen').classList.add('hidden');
      document.getElementById('inputScreen').classList.remove('hidden');
      document.getElementById('selectedName').textContent = nama;
      document.getElementById('nomorInput').value = nomor;
    }

    function clearHistory() {
      if (confirm('Hapus semua riwayat?')) {
        localStorage.removeItem('cekHistory');
        renderHistory();
      }
    }

    function pilihTipe(tipe) {
      isBank = tipe === 'bank';
      document.getElementById('mainMenu').classList.add('hidden');
      document.getElementById('selectionScreen').classList.remove('hidden');
      document.getElementById('selectionTitle').innerHTML = isBank ? '🏦 Pilih Bank' : '📱 Pilih E-Wallet';

      const container = document.getElementById('gridContainer');
      container.innerHTML = '';
      container.className = isBank ? 'grid grid-cols-3 gap-3' : 'grid grid-cols-2 gap-3';

      const data = isBank ? BANKS : WALLETS;
      Object.keys(data).forEach(key => {
        const div = document.createElement('div');
        div.className = `bg-[#111] rounded-2xl p-3 text-center cursor-pointer hover:bg-[#1a1a1a] active:scale-95 transition-all`;
        div.innerHTML = ICONS[key] || `<div class="text-4xl mb-1">${isBank ? '🏦' : '📱'}</div><div class="text-xs font-medium">${key}</div>`;
        div.onclick = () => { kodeTerpilih = data[key]; namaTerpilih = key; showInput(); };
        container.appendChild(div);
      });
    }

    function showInput() {
      document.getElementById('selectionScreen').classList.add('hidden');
      document.getElementById('inputScreen').classList.remove('hidden');
      document.getElementById('selectedName').textContent = namaTerpilih;
      document.getElementById('nomorInput').focus();
    }

    function backToMain() {
      document.getElementById('mainMenu').classList.remove('hidden');
      document.getElementById('selectionScreen').classList.add('hidden');
      document.getElementById('inputScreen').classList.add('hidden');
      document.getElementById('resultScreen').classList.add('hidden');
      document.getElementById('historyScreen').classList.add('hidden');
    }

    function backToSelection() {
      document.getElementById('inputScreen').classList.add('hidden');
      document.getElementById('selectionScreen').classList.remove('hidden');
    }

    async function cekRekening() {
      const nomor = document.getElementById('nomorInput').value.trim();
      if (!nomor) return alert("Masukkan nomor dulu bro!");

      document.getElementById('inputScreen').classList.add('hidden');
      document.getElementById('resultScreen').classList.remove('hidden');

      const card = document.getElementById('resultCard');
      card.innerHTML = `<div class="flex justify-center py-14"><div class="animate-spin h-12 w-12 border-4 border-green-500 border-t-transparent rounded-full"></div></div>`;

      const url = isBank ? "https://rfpdev.xyz/api/check-rekening" : "https://rfpdev.xyz/api/check-ewallet";
      const payload = {
        api_key: API_KEY,
        [isBank ? 'bank_code' : 'ewallet_code']: kodeTerpilih,
        [isBank ? 'account_number' : 'phone_number']: nomor.replace(/[^0-9]/g,'')
      };

      try {
        const res = await fetch(url, { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body:new URLSearchParams(payload) });
        const data = await res.json();

        if (data.status === 'success') {
          const nama = data.data?.customer_name || 'Tidak terdeteksi';
          saveToHistory(isBank, namaTerpilih, nomor, nama);

          card.innerHTML = `
            <div class="text-6xl mb-4">✅</div>
            <h3 class="text-green-400 font-bold mb-5">VERIFIKASI BERHASIL</h3>
            <div class="text-left space-y-3 text-sm">
              <div>Jenis Akun <span class="font-semibold block">${namaTerpilih}</span></div>
              <div>Nomor <span class="font-mono block">${nomor}</span></div>
              <div>Nama Pemilik <span class="font-semibold text-green-300 block">${nama}</span></div>
            </div>
            <button onclick="copyNama('${nama}')" class="mt-6 w-full bg-[#222] hover:bg-[#333] py-4 rounded-3xl text-sm font-medium flex items-center justify-center gap-2">📋 Salin Nama Pemilik</button>
          `;
        } else {
          card.innerHTML = `<div class="text-6xl mb-4">❌</div><p class="text-red-400">${data.message || 'Data tidak ditemukan'}</p>`;
        }
      } catch(e) {
        card.innerHTML = `<div class="text-6xl mb-4">⚠️</div><p class="text-gray-400">Koneksi error</p>`;
      }
    }

    function copyNama(nama) {
      navigator.clipboard.writeText(nama).then(() => {
        const btn = event.currentTarget;
        const original = btn.innerHTML;
        btn.innerHTML = `✅ Berhasil disalin!`;
        setTimeout(() => btn.innerHTML = original, 2000);
      });
    }

    function cekLagi() {
      document.getElementById('resultScreen').classList.add('hidden');
      document.getElementById('inputScreen').classList.remove('hidden');
      document.getElementById('nomorInput').value = '';
    }

    initTelegram();
  </script>
</body>
</html>
